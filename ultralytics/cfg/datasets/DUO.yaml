# DUO (Detection Under the Ocean) 水下目标检测数据集
# 4个类别：holothurian(海参), echinus(海胆), scallop(扇贝), starfish(海星)
# 标注格式：COCO JSON 已转换为 YOLO TXT 格式

# Train/val/test sets as 1) dir: path/to/imgs, 2) file: path/to/imgs.txt, or 3) list: [path/to/imgs1, path/to/imgs2, ..]
path: DUO/DUO  # dataset root dir
train: images/train  # train images (relative to 'path')
val: images/test  # val images (relative to 'path') - 使用test集作为验证集
test:  # test images (optional)

# Classes
names:
  0: holothurian  # 海参
  1: echinus  # 海胆
  2: scallop  # 扇贝
  3: starfish  # 海星
